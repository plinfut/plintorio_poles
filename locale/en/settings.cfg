[mod-setting-name]
plintorio_poles_sp_radius=Small radius
plintorio_poles_sp_dist=Small reach
plintorio_poles_mp_radius=Medium radius
plintorio_poles_mp_dist=Medium reach
plintorio_poles_bp_radius=Big radius
plintorio_poles_bp_dist=Big reach
plintorio_poles_ss_radius=Substation radius
plintorio_poles_ss_dist=Substation reach

[mod-setting-description]
plintorio_poles_sp_radius=The coverage radius of small electric poles. The width and height of the area is twice this.
plintorio_poles_sp_dist=The wire reach of small electric poles. This includes the next pole, so the area between poles is one less than this.
plintorio_poles_mp_radius=The coverage radius of medium electric poles. The width and height of the area is twice this.
plintorio_poles_mp_dist=The wire reach of medium electric poles. This includes the next pole, so the area between poles is one less than this.
plintorio_poles_bp_radius=The coverage radius of big electric poles. The width and height of the area is twice this.
plintorio_poles_bp_dist=The wire reach of big electric poles. This includes the next pole, so the area between poles is two less than this.
plintorio_poles_ss_radius=The coverage radius of substations. The width and height of the area is twice this.
plintorio_poles_ss_dist=The wire reach of substations. This includes the next station, so the area between stations is two less than this.

[shortcut-name]
auto-red-wire=Automatic red wires between electricity poles
auto-green-wire=Automatic green wires between electricity poles